name: CI

# Gate PRs against main and commits landing on main. Kept as "CI"
# (not "tests") so future lint / build / deploy jobs can live here
# alongside pytest without spawning a parallel workflow file.
#
# PRs are blocked from merge until this run is green once branch
# protection is enabled (configured in GitHub settings, not here).

# Restrict GITHUB_TOKEN to the minimum pytest actually needs (reading
# the repo). Without this stanza, jobs inherit the repo-default token
# scopes, which for many repos still include write access to issues,
# PRs, and releases — a needless blast radius for a test runner.
permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel older runs on the same ref when a new commit arrives — saves
# CI minutes when someone force-pushes or pushes several commits in a row.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        # Test the minimum supported version (requires-python = ">=3.11")
        # and the current default, so 3.11-only breakage can't slip through.
        python-version: ["3.11", "3.12"]
    env:
      # Make every uv command in this job use the matrix interpreter.
      UV_PYTHON: ${{ matrix.python-version }}

    steps:
      - uses: actions/checkout@v4
        with:
          # This job only reads the repo; don't leave the GITHUB_TOKEN in
          # .git/config where a later step could pick it up.
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          # Pin the uv version so CI is reproducible; bump deliberately.
          version: "0.5.x"
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type check (mypy)
        run: uv run mypy

      - name: Run pytest
        run: uv run pytest -v

  web-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: receivers/web-dashboard

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: receivers/web-dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check (tsc)
        run: npx tsc --noEmit

      - name: Unit tests (vitest)
        run: npm test
